# Atulya-Launch Dovecot Configuration
# Managed by Atulya-Launch installer

# Protocols
protocols = imap pop3

# Listen
listen = *, ::

# SSL Configuration
ssl = required
ssl_cert = </etc/atulya-launch/ssl/panel.crt
ssl_key = </etc/atulya-launch/ssl/panel.key
ssl_min_protocol = TLSv1.2
ssl_cipher_list = ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
ssl_prefer_server_ciphers = yes

# Mail location
mail_location = maildir:~/Maildir:INBOX=~/Maildir/.LAYOUT=virtual

# System user
mail_uid = 5000
mail_gid = 5000
first_valid_uid = 5000
last_valid_uid = 5000

# Authentication
disable_plaintext_auth = yes
auth_mechanisms = plain login

# Passdb (PAM by default)
passdb {
    driver = pam
}

# Userdb
userdb {
    driver = passwd
}

# Authentication socket
service auth {
    unix_listener /var/spool/postfix/private/auth {
        mode = 0660
        user = postfix
        group = postfix
    }
}

# Process limits
service imap-login {
    process_min_avail = 1
    process_limit = 256
}

service pop3-login {
    process_min_avail = 1
    process_limit = 128
}

# IMAP settings
protocol imap {
    mail_max_userip_connections = 20
    imap_idle_notify_interval = 2400
}

# POP3 settings
protocol pop3 {
    pop3_uidl_format = %08Xu%08Xv
    pop3_no_flag_updates = yes
}

# Logging
log_path = /var/log/dovecot.log
auth_verbose = no
auth_verbose_passwords = no
auth_debug = no

# Namespace
namespace inbox {
    inbox = yes
    separator = .

    mailbox Drafts {
        auto = subscribe
        special_use = \Drafts
    }
    mailbox Junk {
        auto = subscribe
        special_use = \Junk
    }
    mailbox Sent {
        auto = subscribe
        special_use = \Sent
    }
    mailbox Trash {
        auto = subscribe
        special_use = \Trash
    }
    mailbox Archive {
        auto = subscribe
        special_use = \Archive
    }
}

# Fail2ban filter for Atulya-Launch Panel
# Matches failed login attempts on the panel

[Definition]

failregex = ^.*Failed login attempt from <HOST>.*$
            ^.*Invalid credentials from <HOST>.*$
            ^.*Authentication failed for user .* from <HOST>.*$
            ^.*401 .* <HOST> .*$
            ^.*Unauthorized access attempt from <HOST>.*$

ignoreregex =

datepattern = %%Y-%%m-%%d %%H:%%M:%%S

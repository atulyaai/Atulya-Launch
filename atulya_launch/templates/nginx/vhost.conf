# Atulya-Launch Virtual Host Template
# Variables: {{domain}}, {{web_root}}, {{php_enabled}}, {{proxy_pass}}, {{ssl_enabled}}

# Rate limiting per domain
limit_req_zone $binary_remote_addr zone=atulya_{{domain}}:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name {{domain}} www.{{domain}};

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{domain}} www.{{domain}};

    root {{web_root}};
    index index.html index.htm index.php;

    # SSL Configuration
    ssl_certificate     /etc/letsencrypt/live/{{domain}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{domain}}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:{{domain}}:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limiting
    limit_req zone=atulya_{{domain}} burst=50 nodelay;
    limit_req_status 429;

    # Upload limit
    client_max_body_size 64M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Main location
    location / {
        try_files $uri $uri/ =404;
    }

    # PHP-FPM support
    {{php_block}}

    # Proxy pass support
    {{proxy_block}}

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~* \.(env|log|ini|sql)$ {
        deny all;
    }

    access_log /var/log/nginx/{{domain}}.access.log;
    error_log  /var/log/nginx/{{domain}}.error.log;
}
